<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desi Feud – 🇮🇳</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-dark: #002366;
    --blue-mid: #003399;
    --blue-light: #0044cc;
    --gold: #FFD700;
    --gold-dark: #cc9900;
    --red: #cc0000;
    --red-bright: #ff2200;
    --white: #ffffff;
    --off-white: #f5f0e8;
    --black: #0a0a0a;
    --green-correct: #00aa44;
    --wrong-red: #dd0000;
    --cell-bg: #001a4d;
    --cell-border: #0055ff;
    --shadow: 0 4px 32px rgba(0,0,0,0.7);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--blue-dark);
    font-family: 'Barlow Condensed', sans-serif;
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(0,68,204,0.3) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(0,68,204,0.3) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,215,0,0.03) 60px, rgba(255,215,0,0.03) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,215,0,0.03) 60px, rgba(255,215,0,0.03) 61px);
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .screen.active { display: flex; }

  /* ===== TITLE SCREEN ===== */
  #title-screen {
    gap: 30px;
    background: radial-gradient(ellipse at center, #003399 0%, #001133 70%);
  }

  .title-logo {
    text-align: center;
    animation: titlePulse 2s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .title-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 100px);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.6), 4px 4px 0 #cc7700, 8px 8px 0 #884400;
    letter-spacing: 4px;
    line-height: 1;
  }

  .title-sub {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(24px, 5vw, 52px);
    color: var(--white);
    text-shadow: 2px 2px 0 var(--blue-mid);
    letter-spacing: 6px;
  }

  .title-flag { font-size: 48px; animation: spin 3s linear infinite; display: inline-block; }
  @keyframes spin { 0% { transform: rotateY(0); } 50% { transform: rotateY(180deg); } 100% { transform: rotateY(360deg); } }

  .player-setup { width: 100%; max-width: 500px; }

  .player-setup h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 3px;
  }

  #player-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .player-input-row {
    display: flex; gap: 8px; align-items: center;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }

  .player-input-row span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--gold);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  .player-input-row input {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 2px solid var(--gold);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    font-weight: 600;
    outline: none;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .player-input-row input:focus {
    background: rgba(255,255,255,0.18);
    box-shadow: 0 0 0 2px var(--gold);
  }
  .player-input-row input::placeholder { color: rgba(255,255,255,0.4); }

  .remove-btn {
    background: var(--red);
    border: none;
    color: white;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .remove-btn:hover { background: var(--red-bright); transform: scale(1.1); }

  .btn {
    display: inline-block;
    padding: 14px 36px;
    border: none;
    border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    text-transform: uppercase;
  }
  .btn:active { transform: scale(0.97); }

  .btn-gold {
    background: linear-gradient(180deg, #ffe566 0%, var(--gold) 50%, #cc9900 100%);
    color: var(--black);
    box-shadow: 0 6px 0 #884400, var(--shadow);
  }
  .btn-gold:hover { box-shadow: 0 8px 0 #884400, var(--shadow); transform: translateY(-2px); }

  .btn-blue {
    background: linear-gradient(180deg, #0077ff 0%, var(--blue-light) 50%, #002299 100%);
    color: var(--white);
    box-shadow: 0 6px 0 #001166, var(--shadow);
  }
  .btn-blue:hover { box-shadow: 0 8px 0 #001166, var(--shadow); transform: translateY(-2px); }

  .btn-red {
    background: linear-gradient(180deg, #ff4422 0%, var(--red) 50%, #880000 100%);
    color: var(--white);
    box-shadow: 0 6px 0 #550000, var(--shadow);
  }
  .btn-red:hover { box-shadow: 0 8px 0 #550000, var(--shadow); transform: translateY(-2px); }

  .setup-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* ===== GAME SCREEN ===== */
  #game-screen { justify-content: flex-start; padding: 10px 16px; gap: 10px; }

  .game-header {
    width: 100%;
    max-width: 800px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }

  .round-badge {
    background: var(--red);
    padding: 6px 18px;
    border-radius: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    box-shadow: 0 3px 0 #550000;
  }

  .current-player-banner {
    background: linear-gradient(135deg, var(--gold) 0%, #cc9900 100%);
    color: var(--black);
    padding: 8px 20px;
    border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    box-shadow: 0 3px 0 #553300;
    text-align: center;
    animation: playerPulse 1.5s ease-in-out infinite;
  }
  @keyframes playerPulse {
    0%,100% { box-shadow: 0 3px 0 #553300; }
    50% { box-shadow: 0 3px 20px rgba(255,215,0,0.8), 0 3px 0 #553300; }
  }

  .score-badge {
    background: var(--cell-bg);
    border: 2px solid var(--gold);
    padding: 6px 16px;
    border-radius: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold);
  }

  /* ===== BOARD ===== */
  .board-container {
    width: 100%;
    max-width: 800px;
  }

  .question-box {
    background: var(--blue-mid);
    border: 3px solid var(--gold);
    border-radius: 10px;
    padding: 14px 24px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(18px, 3.5vw, 26px);
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 14px;
    box-shadow: 0 4px 0 #001166, var(--shadow);
    letter-spacing: 0.5px;
  }

  .round-score-display {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.5), 2px 2px 0 #884400;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }

  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .answer-cell {
    background: var(--cell-bg);
    border: 3px solid var(--cell-border);
    border-radius: 8px;
    padding: 0;
    min-height: 60px;
    display: flex;
    align-items: center;
    overflow: hidden;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 2px 0 #001166;
    position: relative;
  }

  .cell-number {
    background: var(--blue-light);
    color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    width: 44px;
    height: 100%;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-right: 2px solid var(--cell-border);
    letter-spacing: 1px;
  }

  .cell-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    gap: 8px;
  }

  .cell-answer {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(15px, 2.5vw, 20px);
    font-weight: 700;
    color: var(--gold);
    opacity: 0;
    transition: opacity 0.3s;
    flex: 1;
  }

  .cell-points {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--white);
    opacity: 0;
    transition: opacity 0.3s;
    flex-shrink: 0;
  }

  .answer-cell.revealed .cell-answer,
  .answer-cell.revealed .cell-points { opacity: 1; }

  .answer-cell.revealed {
    background: linear-gradient(135deg, #001a4d 0%, #002a6e 100%);
    border-color: var(--gold);
    animation: revealFlash 0.5s ease;
  }

  @keyframes revealFlash {
    0% { background: #ffff00; border-color: #ffff00; }
    30% { background: #ffaa00; }
    100% { background: linear-gradient(135deg, #001a4d 0%, #002a6e 100%); border-color: var(--gold); }
  }

  /* X Marks */
  .x-marks { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; height: 50px; }
  .x-mark {
    font-size: 60px;
    color: var(--red-bright);
    opacity: 0;
    transition: opacity 0.2s;
    font-weight: 900;
    text-shadow: 0 0 20px rgba(255,34,0,0.8);
    line-height: 1;
    font-family: 'Bebas Neue', sans-serif;
  }
  .x-mark.show { opacity: 1; animation: xBounce 0.4s ease; }
  @keyframes xBounce { 0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0)} }

  /* Answer Input */
  .answer-section {
    display: flex;
    gap: 10px;
    align-items: stretch;
    flex-wrap: wrap;
  }

  .answer-input {
    flex: 1;
    min-width: 200px;
    background: rgba(255,255,255,0.12);
    border: 3px solid var(--gold);
    border-radius: 8px;
    padding: 12px 18px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 18px;
    font-weight: 600;
    outline: none;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .answer-input:focus {
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 0 2px rgba(255,215,0,0.5);
  }
  .answer-input::placeholder { color: rgba(255,255,255,0.4); }

  /* Feedback */
  .feedback-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 100;
    pointer-events: none;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .feedback-overlay.show { transform: translate(-50%, -50%) scale(1); }

  .feedback-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 100px;
    text-align: center;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.5);
    letter-spacing: 6px;
  }
  .feedback-text.correct { color: #00ff66; }
  .feedback-text.wrong { color: var(--red-bright); }

  /* ===== LEADERBOARD SCREEN ===== */
  #leaderboard-screen {
    background: radial-gradient(ellipse at center, #002277 0%, #000d33 70%);
    gap: 24px;
  }

  .lb-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 8vw, 80px);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.5), 4px 4px 0 #884400;
    letter-spacing: 4px;
    text-align: center;
  }

  .lb-table {
    width: 100%;
    max-width: 600px;
    border-collapse: collapse;
  }

  .lb-table th {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold);
    padding: 10px 16px;
    border-bottom: 3px solid var(--gold);
    text-align: left;
  }
  .lb-table th:last-child { text-align: right; }

  .lb-table td {
    padding: 12px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,215,0,0.2);
    transition: background 0.2s;
  }
  .lb-table td:last-child { text-align: right; font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--gold); }

  .lb-table tr:first-child td { color: var(--gold); font-size: 24px; }
  .lb-table tr:nth-child(1) td { background: rgba(255,215,0,0.08); }
  .lb-table tr:nth-child(2) td { background: rgba(192,192,192,0.05); }
  .lb-table tr:nth-child(3) td { background: rgba(205,127,50,0.05); }

  .rank-icon { font-size: 22px; margin-right: 8px; }

  /* ===== ROUND RESULT SCREEN ===== */
  #round-result-screen {
    background: radial-gradient(ellipse at center, #004400 0%, #001a00 70%);
    gap: 20px;
    text-align: center;
  }

  .rr-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 7vw, 72px);
    color: var(--gold);
    letter-spacing: 4px;
  }

  .rr-winner {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(22px, 4vw, 40px);
    font-weight: 800;
    color: var(--white);
  }

  .rr-points {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 10vw, 100px);
    color: var(--green-correct);
    text-shadow: 0 0 30px rgba(0,255,100,0.4);
  }

  .rr-board-reveal {
    width: 100%;
    max-width: 700px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .rr-answer-row {
    background: rgba(0,30,80,0.6);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 6px;
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 600;
  }
  .rr-pts { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); }

  /* ===== FINAL SCREEN ===== */
  #final-screen {
    background: radial-gradient(ellipse at center, #550000 0%, #1a0000 70%);
    gap: 24px;
    text-align: center;
  }

  .winner-crown { font-size: 80px; animation: crownBounce 1s ease-in-out infinite; }
  @keyframes crownBounce { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-10px) rotate(5deg)} }

  .winner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 8vw, 80px);
    color: var(--gold);
    text-shadow: 0 0 40px rgba(255,215,0,0.8), 4px 4px 0 #884400;
    letter-spacing: 4px;
  }

  .winner-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    color: var(--white);
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: confettiFall linear forwards;
    pointer-events: none;
    z-index: 999;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Difficulty badge */
  .difficulty-badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .diff-easy { background: var(--green-correct); color: white; }
  .diff-medium { background: #ff8800; color: white; }
  .diff-hard { background: var(--red); color: white; }
  .diff-expert { background: #880088; color: white; }

  /* Responsive */
  @media (max-width: 500px) {
    .answers-grid { grid-template-columns: 1fr; }
    .rr-board-reveal { grid-template-columns: 1fr; }
    .cell-answer { font-size: 14px; }
  }

  .skip-btn {
    background: transparent;
    border: 2px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.5);
    padding: 8px 20px;
    border-radius: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .skip-btn:hover { border-color: rgba(255,255,255,0.6); color: rgba(255,255,255,0.8); }

  .strikes-info {
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    margin-top: -6px;
  }

  .game-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 800px;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen active">
  <div class="title-logo">
    <div class="title-main">Desi Feud</div>
    <div class="title-sub">🇮🇳 Indian Edition 🇮🇳</div>
  </div>

  <div class="player-setup">
    <h2>Enter Players</h2>
    <div id="player-list"></div>
    <div class="setup-btns">
      <button class="btn btn-blue" onclick="addPlayer()">+ Add Player</button>
      <button class="btn btn-gold" onclick="startGame()">Start Game ▶</button>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="round-badge" id="round-indicator">Round 1 / 8</div>
    <div class="current-player-banner" id="current-player-name">Player</div>
    <div class="score-badge">Score: <span id="current-score">0</span></div>
  </div>

  <div class="board-container">
    <div class="question-box" id="question-text">Question here</div>
    <div class="round-score-display" id="round-score-display">0</div>
    <div class="answers-grid" id="answers-grid"></div>

    <div class="x-marks" id="x-marks">
      <span class="x-mark" id="x1">✗</span>
      <span class="x-mark" id="x2">✗</span>
      <span class="x-mark" id="x3">✗</span>
    </div>

    <div class="strikes-info">3 wrong answers = round over</div>

    <div class="answer-section">
      <input type="text" class="answer-input" id="answer-input" placeholder="Type your answer..." autocomplete="off" onkeydown="if(event.key==='Enter') submitAnswer()">
      <button class="btn btn-gold" onclick="submitAnswer()">Submit</button>
    </div>
  </div>

  <div class="game-footer">
    <button class="skip-btn" onclick="skipRound()">Skip Round →</button>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:15px;color:rgba(255,255,255,0.4);">
      Answers left: <span id="answers-left">0</span>
    </div>
  </div>
</div>

<!-- ROUND RESULT SCREEN -->
<div id="round-result-screen" class="screen">
  <div class="rr-title">Round Complete!</div>
  <div id="rr-found-text" class="rr-winner"></div>
  <div id="rr-points" class="rr-points">+0</div>
  <div class="rr-board-reveal" id="rr-board"></div>
  <button class="btn btn-gold" onclick="nextRound()">Next Round ▶</button>
</div>

<!-- LEADERBOARD SCREEN (between rounds) -->
<div id="leaderboard-screen" class="screen">
  <div class="lb-title">🏆 Leaderboard</div>
  <table class="lb-table" id="lb-table"></table>
  <button class="btn btn-gold" onclick="continueToGame()">Continue ▶</button>
</div>

<!-- FINAL SCREEN -->
<div id="final-screen" class="screen">
  <div class="winner-crown">👑</div>
  <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--white);letter-spacing:3px;">WINNER!</div>
  <div class="winner-name" id="final-winner-name">Player</div>
  <div class="winner-score" id="final-winner-score">0 Points</div>
  <div style="margin-top:10px;width:100%;max-width:500px;">
    <div class="lb-title" style="font-size:32px;margin-bottom:12px;">Final Standings</div>
    <table class="lb-table" id="final-lb-table"></table>
  </div>
  <button class="btn btn-red" onclick="restartGame()" style="margin-top:10px;">Play Again 🔄</button>
</div>

<!-- Feedback Overlay -->
<div class="feedback-overlay" id="feedback-overlay">
  <div class="feedback-text" id="feedback-text"></div>
</div>

<script>
// ============================================================
// GAME DATA — Indian-themed questions, increasing difficulty
// ============================================================
const ALL_ROUNDS = [
  // ============================================================
  // EASY (8 rounds)
  // ============================================================

// Shuffle rounds within each difficulty tier, then sort by tier order
function buildRoundOrder() {
  const tiers = ['easy','medium','hard','expert'];
  let result = [];
  tiers.forEach(tier => {
    let tierRounds = ALL_ROUNDS.filter(r => r.difficulty === tier);
    // Fisher-Yates shuffle within tier
    for (let i = tierRounds.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [tierRounds[i], tierRounds[j]] = [tierRounds[j], tierRounds[i]];
    }
    result = result.concat(tierRounds);
  });
  return result;
}

let ROUNDS = buildRoundOrder();

let players = [];

let wrongGuesses = 0;

const WRONG_LIMIT = 3;

// ============================================================
// PLAYER SETUP
// ============================================================
function addPlayer() {
  const list = document.getElementById('player-list');
  const idx = list.children.length + 1;
  if (idx > 8) { alert('Maximum 8 players!'); return; }
  const row = document.createElement('div');
  row.className = 'player-input-row';
  row.innerHTML = `
    <span>${idx}.</span>
    <input type="text" placeholder="Player ${idx} name" maxlength="20">
    <button class="remove-btn" onclick="removePlayer(this)">✕</button>
  `;
  list.appendChild(row);
}

function removePlayer(btn) {
  btn.parentElement.remove();
  renumberPlayers();
}

function renumberPlayers() {
  const rows = document.querySelectorAll('.player-input-row');
  rows.forEach((r, i) => { r.querySelector('span').textContent = (i+1) + '.'; });
}

function startGame() {
  const inputs = document.querySelectorAll('.player-input-row input');
  players = [];
  inputs.forEach(inp => {
    const name = inp.value.trim();
    if (name) players.push(name);
  });
  if (players.length < 1) { alert('Add at least 1 player!'); return; }
  playerScores = new Array(players.length).fill(0);
  currentRoundIndex = 0;
  currentPlayerIndex = 0;
  showScreen('game-screen');
  loadRound();
}

// ============================================================
// ROUND LOGIC
// ============================================================
function loadRound() {
  const round = ROUNDS[currentRoundIndex];
  wrongGuesses = 0;
  roundScore = 0;
  revealedAnswers = new Array(round.answers.length).fill(false);

  // Header
  document.getElementById('round-indicator').innerHTML =
    `Round ${currentRoundIndex+1} / ${ROUNDS.length}
    <span class="difficulty-badge diff-${round.difficulty}">${round.difficulty.toUpperCase()}</span>`;
  document.getElementById('current-player-name').textContent = players[currentPlayerIndex];
  document.getElementById('current-score').textContent = playerScores[currentPlayerIndex];
  document.getElementById('round-score-display').textContent = '0';
  document.getElementById('answers-left').textContent = round.answers.length;

  // Question
  document.getElementById('question-text').textContent = round.question;

  // Build grid
  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  round.answers.forEach((ans, i) => {
    grid.innerHTML += `
      <div class="answer-cell" id="cell-${i}">
        <div class="cell-number">${i+1}</div>
        <div class="cell-content">
          <span class="cell-answer" id="ans-${i}">${ans.text}</span>
          <span class="cell-points" id="pts-${i}">${ans.points}</span>
        </div>
      </div>`;
  });

  // Reset X marks
  for (let j=1;j<=3;j++) {
    const el = document.getElementById('x'+j);
    el.classList.remove('show');
  }

  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').focus();
}

function submitAnswer() {
  const input = document.getElementById('answer-input');
  const guess = input.value.trim();
  if (!guess) return;
  input.value = '';
  input.focus();

  const round = ROUNDS[currentRoundIndex];
  let matched = false;

  for (let i = 0; i < round.answers.length; i++) {
    if (revealedAnswers[i]) continue;
    const answerNorm = normalise(round.answers[i].text);
    const guessNorm = normalise(guess);
    if (fuzzyMatch(guessNorm, answerNorm)) {
      // Correct!
      revealedAnswers[i] = true;
      roundScore += round.answers[i].points;
      revealCell(i);
      showFeedback(true, `+${round.answers[i].points}`);
      document.getElementById('round-score-display').textContent = roundScore;
      updateAnswersLeft();
      matched = true;
      break;
    }
  }

  if (!matched) {
    wrongGuesses++;
    document.getElementById('x'+wrongGuesses).classList.add('show');
    showFeedback(false, 'WRONG!');
    if (wrongGuesses >= WRONG_LIMIT) {
      setTimeout(endRound, 800);
    }
  } else {
    // Check if all revealed
    if (revealedAnswers.every(r => r)) {
      setTimeout(endRound, 800);
    }
  }
}

function normalise(str) {
  return str.toLowerCase()
    .replace(/[\/\(\)]/g, ' ')
    .replace(/[^a-z0-9\s]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function fuzzyMatch(guess, answer) {
  if (guess === answer) return true;
  if (answer.includes(guess) && guess.length >= 3) return true;
  if (guess.includes(answer) && answer.length >= 3) return true;
  // Word overlap
  const gWords = guess.split(' ').filter(w => w.length > 2);
  const aWords = answer.split(' ').filter(w => w.length > 2);
  const overlap = gWords.filter(w => aWords.some(aw => aw.includes(w) || w.includes(aw)));
  if (overlap.length >= 1 && gWords.length <= 3) return true;
  return false;
}

function revealCell(index) {
  const cell = document.getElementById('cell-'+index);
  cell.classList.add('revealed');
}

function updateAnswersLeft() {
  const left = revealedAnswers.filter(r => !r).length;
  document.getElementById('answers-left').textContent = left;
}

function skipRound() { endRound(); }

function endRound() {
  // Award points
  playerScores[currentPlayerIndex] += roundScore;

  // Show all answers
  const round = ROUNDS[currentRoundIndex];
  revealedAnswers.forEach((r, i) => {
    if (!r) {
      revealCell(i); // show unrevealed too
    }
  });

  // Build result screen
  const foundCount = revealedAnswers.filter(r=>r).length;
  document.getElementById('rr-found-text').textContent =
    `${players[currentPlayerIndex]} found ${foundCount} of ${round.answers.length} answers!`;
  document.getElementById('rr-points').textContent = `+${roundScore}`;

  const rrBoard = document.getElementById('rr-board');
  rrBoard.innerHTML = '';
  round.answers.forEach((ans, i) => {
    const found = revealedAnswers[i];
    rrBoard.innerHTML += `
      <div class="rr-answer-row" style="${found ? 'border-color:rgba(0,255,100,0.4);' : ''}">
        <span>${found ? '✅' : '❌'} ${ans.text}</span>
        <span class="rr-pts">${ans.points}</span>
      </div>`;
  });

  setTimeout(() => showScreen('round-result-screen'), 600);
}

function nextRound() {
  // Advance player
  currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
  currentRoundIndex++;

  // Show leaderboard between rounds (except last)
  if (currentRoundIndex < ROUNDS.length) {
    renderLeaderboard('lb-table');
    showScreen('leaderboard-screen');
  } else {
    showFinalScreen();
  }
}

function continueToGame() {
  showScreen('game-screen');
  loadRound();
}

// ============================================================
// LEADERBOARD
// ============================================================
function renderLeaderboard(tableId) {
  const sorted = players
    .map((name, i) => ({ name, score: playerScores[i] }))
    .sort((a, b) => b.score - a.score);

  const ranks = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣'];
  const table = document.getElementById(tableId);
  table.innerHTML = `<tr><th>Rank</th><th>Player</th><th>Score</th></tr>`;
  sorted.forEach((p, i) => {
    table.innerHTML += `
      <tr>
        <td><span class="rank-icon">${ranks[i] || (i+1)}</span></td>
        <td>${p.name}</td>
        <td>${p.score}</td>
      </tr>`;
  });
}

function showFinalScreen() {
  renderLeaderboard('final-lb-table');
  const sorted = players
    .map((name, i) => ({ name, score: playerScores[i] }))
    .sort((a, b) => b.score - a.score);

  document.getElementById('final-winner-name').textContent = sorted[0].name;
  document.getElementById('final-winner-score').textContent = `${sorted[0].score} Points`;

  launchConfetti();
  showScreen('final-screen');
}

// ============================================================
// FEEDBACK
// ============================================================
let feedbackTimer = null;
function showFeedback(correct, text) {
  const overlay = document.getElementById('feedback-overlay');
  const ftxt = document.getElementById('feedback-text');
  ftxt.textContent = text;
  ftxt.className = 'feedback-text ' + (correct ? 'correct' : 'wrong');
  overlay.classList.add('show');
  if (feedbackTimer) clearTimeout(feedbackTimer);
  feedbackTimer = setTimeout(() => overlay.classList.remove('show'), 800);
}

// ============================================================
// CONFETTI
// ============================================================
function launchConfetti() {
  const colors = ['#FFD700','#ff4422','#00aaff','#00ff66','#ff88cc','#ffffff','#ff9900'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.width = (Math.random() * 10 + 6) + 'px';
      c.style.height = (Math.random() * 10 + 6) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
      c.style.animationDuration = (Math.random() * 2 + 2) + 's';
      c.style.animationDelay = '0s';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 40);
  }
}

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function restartGame() {
  ROUNDS = buildRoundOrder();
  currentRoundIndex = 0;
  currentPlayerIndex = 0;
  playerScores = new Array(players.length).fill(0);
  showScreen('game-screen');
  loadRound();
}

// ============================================================
// INIT — Add default 2 players
// ============================================================
window.onload = () => {
  addPlayer();
  addPlayer();
};
</script>
